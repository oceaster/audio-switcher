name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: ShellCheck
        run: shellcheck audio-switcher
      - name: Check formatting (shfmt)
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          shfmt -d audio-switcher

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: ./tests/run-tests.sh
